name: Java CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run tests
        run: mvn --batch-mode --errors --fail-at-end --show-version test

  feature4-demo:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    environment: feature4-demo
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure database password is configured
        run: test -n "$SUPABASE_DB_PASSWORD"

      - name: Run Feature4 demo
        run: mvn --batch-mode --errors --fail-at-end --show-version -DskipTests compile "-Dexec.mainClass=ru.t1.feature4.users.Feature4Demo" exec:java

  feature5-demo:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    environment: feature4-demo
    env:
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Ensure database password is configured
        run: test -n "$SUPABASE_DB_PASSWORD"

      - name: Run Feature5 demo
        run: mvn --batch-mode --errors --fail-at-end --show-version -DskipTests compile "-Dexec.mainClass=ru.t1.feature5.users.Feature5Application" exec:java
